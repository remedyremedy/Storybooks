<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Storybooks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --sky:#1b2350;          /* dusk indigo */
    --sky-deep:#131a3d;
    --lamp:#ffd58a;         /* warm lamp glow */
    --shelf:#7a5636;        /* wooden ledge */
    --shelf-edge:#5e3f24;
    --ink:#f4f1ff;
    --ink-dim:#b9b8d9;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:'Nunito',sans-serif;
    color:var(--ink);
    background:
      radial-gradient(ellipse 120% 60% at 50% -10%, #2c3670 0%, transparent 60%),
      linear-gradient(var(--sky), var(--sky-deep));
    min-height:100%;
    padding-bottom:48px;
    overflow-x:hidden;
  }
  /* twinkling stars — pure CSS, respects reduced motion */
  .stars{position:fixed;inset:0;pointer-events:none;z-index:0}
  .stars span{
    position:absolute;width:3px;height:3px;border-radius:50%;
    background:var(--ink);opacity:.6;
    animation:twinkle 3.5s ease-in-out infinite;
  }
  @keyframes twinkle{0%,100%{opacity:.15}50%{opacity:.75}}
  @media (prefers-reduced-motion: reduce){.stars span{animation:none;opacity:.4}}

  header{position:relative;z-index:1;text-align:center;padding:44px 20px 26px}
  header .moon{
    display:inline-block;width:56px;height:56px;border-radius:50%;
    background:radial-gradient(circle at 35% 35%, #fff5d6, var(--lamp) 70%);
    box-shadow:0 0 46px 12px rgba(255,213,138,.35);
    margin-bottom:14px;
  }
  h1{
    font-family:'Baloo 2',cursive;font-weight:800;
    font-size:clamp(1.9rem, 7vw, 2.7rem);
    line-height:1.1;letter-spacing:.5px;
  }
  header p{color:var(--ink-dim);margin-top:8px;font-size:1rem}

  .shelves{position:relative;z-index:1;max-width:640px;margin:0 auto;padding:0 18px}
  .shelf-row{margin-bottom:8px}
  .shelf-books{
    display:grid;grid-template-columns:repeat(3,1fr);gap:16px;
    align-items:end;padding:0 6px;
  }
  /* the wooden ledge under each row of books */
  .ledge{
    height:14px;border-radius:4px;margin:0 -2px 26px;
    background:linear-gradient(var(--shelf), var(--shelf-edge));
    box-shadow:0 10px 16px rgba(0,0,0,.45), inset 0 2px 0 rgba(255,255,255,.12);
  }

  .book{
    display:block;text-decoration:none;color:inherit;text-align:center;
    transition:transform .15s ease;
  }
  .book:active{transform:scale(.96)}
  .book:focus-visible{outline:3px solid var(--lamp);outline-offset:4px;border-radius:8px}
  .cover{
    position:relative;aspect-ratio:3/4;border-radius:6px 10px 10px 6px;
    overflow:hidden;
    box-shadow:0 6px 14px rgba(0,0,0,.5), inset -3px 0 6px rgba(0,0,0,.18);
    background:#333;
  }
  .cover img{width:100%;height:100%;object-fit:cover;display:block}
  /* generated placeholder when no cover image exists yet */
  .cover .ph{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    padding:10px;
    font-family:'Baloo 2',cursive;font-weight:600;
    font-size:clamp(.72rem, 2.9vw, .95rem);line-height:1.25;
    color:rgba(30,30,50,.85);text-shadow:0 1px 0 rgba(255,255,255,.35);
  }
  .meta{margin-top:9px}
  .meta .t{
    font-family:'Baloo 2',cursive;font-weight:600;font-size:.85rem;line-height:1.2;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  }
  .meta .a{color:var(--ink-dim);font-size:.72rem;margin-top:2px}
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<header>
  <span class="moon" aria-hidden="true"></span>
  <h1>Our Storybooks</h1>
  <p>Pick a book to read together</p>
</header>

<main class="shelves" id="shelves"></main>

<script src="books.js"></script>
<script>
  // --- placeholder pastels, rotated per book ---
  const PASTELS = [
    "linear-gradient(160deg,#ffd6e0,#f7a8bd)",
    "linear-gradient(160deg,#cdeffd,#93c9ef)",
    "linear-gradient(160deg,#fff3c4,#f6d47a)",
    "linear-gradient(160deg,#d8f5d0,#a3dba0)",
    "linear-gradient(160deg,#e7dcff,#c1abef)",
    "linear-gradient(160deg,#ffe3c9,#f4b47f)"
  ];

  // --- build shelves: rows of 3 books, each on a wooden ledge ---
  const shelves = document.getElementById("shelves");
  const perRow = 3;

  for (let i = 0; i < BOOKS.length; i += perRow) {
    const row = document.createElement("div");
    row.className = "shelf-row";
    const grid = document.createElement("div");
    grid.className = "shelf-books";

    BOOKS.slice(i, i + perRow).forEach((book, j) => {
      const idx = i + j;
      const a = document.createElement("a");
      a.className = "book";
      a.href = "storybook.html?book=" + encodeURIComponent(book.slug);
      a.setAttribute("aria-label", "Read " + book.title);

      const cover = document.createElement("div");
      cover.className = "cover";

      const img = document.createElement("img");
      img.src = "books/" + book.slug + "/images/cover.jpg";
      img.alt = "";
      // if the cover image doesn't exist yet, show a pastel placeholder
      img.onerror = () => {
        img.remove();
        const ph = document.createElement("div");
        ph.className = "ph";
        ph.style.background = PASTELS[idx % PASTELS.length];
        ph.textContent = book.title;
        cover.appendChild(ph);
      };
      cover.appendChild(img);

      const meta = document.createElement("div");
      meta.className = "meta";
      meta.innerHTML =
        '<div class="t">' + book.title + "</div>" +
        (book.author ? '<div class="a">' + book.author + "</div>" : "");

      a.appendChild(cover);
      a.appendChild(meta);
      grid.appendChild(a);
    });

    row.appendChild(grid);
    const ledge = document.createElement("div");
    ledge.className = "ledge";
    row.appendChild(ledge);
    shelves.appendChild(row);
  }

  // --- a scattering of stars ---
  const starsBox = document.getElementById("stars");
  for (let s = 0; s < 26; s++) {
    const st = document.createElement("span");
    st.style.left = Math.random() * 100 + "%";
    st.style.top = Math.random() * 45 + "%";
    st.style.animationDelay = (Math.random() * 3.5) + "s";
    st.style.transform = "scale(" + (0.5 + Math.random()) + ")";
    starsBox.appendChild(st);
  }
</script>
</body>
</html>
