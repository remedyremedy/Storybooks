<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Why is the Sky Blue?</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Nunito:wght@300;400&display=swap');

  :root {
    --bg: #0f0e0c;
    --gold: #c9a96e;
    --gold-dim: rgba(201,169,110,0.18);
    --gold-border: rgba(201,169,110,0.45);
    --text: #e8dcc8;
    --muted: rgba(232,220,200,0.45);
    --btn-bg: rgba(255,255,255,0.07);
    --btn-border: rgba(255,255,255,0.13);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: 'Lora', Georgia, serif; color: var(--text); }
  #app { width: 100%; height: 100dvh; display: flex; flex-direction: column; position: relative; overflow: hidden; }

  #topbar {
    position: absolute; top: 0; left: 0; right: 0; z-index: 20;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px 20px;
    background: linear-gradient(to bottom, rgba(15,14,12,0.97) 60%, transparent);
    pointer-events: none;
  }
  #topbar > * { pointer-events: all; }
  #page-label { font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 300; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
  #controls { display: flex; gap: 8px; align-items: center; }
  .btn {
    display: flex; align-items: center; gap: 5px;
    background: var(--btn-bg); border: 1px solid var(--btn-border);
    color: var(--muted); border-radius: 8px; padding: 7px 10px;
    cursor: pointer; font-size: 12px; font-family: 'Nunito', sans-serif;
    letter-spacing: 0.05em; transition: all 0.2s ease; outline: none;
  }
  .btn.active { background: var(--gold-dim); border-color: var(--gold-border); color: var(--gold); }

  #img-area {
    flex: 1; display: flex; align-items: center; justify-content: center;
    overflow: hidden; position: relative; touch-action: none;
  }
  #img-area img {
    max-width: 100%; max-height: 100%; display: block;
    touch-action: none; user-select: none; -webkit-user-drag: none;
    transform-origin: center center;
    transition: opacity 0.2s ease;
    pointer-events: none;
  }
  #img-area img.fade { opacity: 0; }

  /* Left/right tap zones — invisible, sit on top of image */
  #tap-left, #tap-right {
    position: absolute; top: 0; bottom: 0; z-index: 5;
    cursor: pointer;
  }
  #tap-left  { left: 0;   width: 25%; }
  #tap-right { right: 0;  width: 75%; }

  #hint {
    position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.65); color: var(--text); font-family: 'Nunito', sans-serif;
    font-size: 12px; padding: 7px 16px; border-radius: 20px;
    letter-spacing: 0.04em; white-space: nowrap; pointer-events: none; z-index: 10;
    animation: fadeout 4s ease forwards;
  }
  @keyframes fadeout { 0%,65%{opacity:1} 100%{opacity:0} }

  #soundbars {
    position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
    display: none; gap: 4px; align-items: flex-end; pointer-events: none; z-index: 10;
  }
  #soundbars.visible { display: flex; }
  .bar { width: 4px; border-radius: 2px; background: var(--gold); animation: bounce 0.5s ease-in-out infinite alternate; }
  @keyframes bounce { from{transform:scaleY(0.4)} to{transform:scaleY(1)} }

  #toast {
    position: absolute; top: 65px; left: 50%; transform: translateX(-50%);
    background: rgba(30,20,10,0.92); border: 1px solid var(--gold-border);
    color: var(--gold); font-family: 'Nunito', sans-serif;
    font-size: 12px; padding: 7px 16px; border-radius: 20px;
    white-space: nowrap; pointer-events: none; z-index: 25;
    opacity: 0; transition: opacity 0.3s ease;
  }
  #toast.show { opacity: 1; }

  #bottombar {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 20;
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 20px 28px;
    background: linear-gradient(to top, rgba(15,14,12,0.97) 60%, transparent);
    pointer-events: none;
  }
  #bottombar > * { pointer-events: all; }
  .nav-btn {
    width: 50px; height: 50px; border-radius: 50%;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.65); display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.2s ease; outline: none;
  }
  .nav-btn:disabled { color: rgba(255,255,255,0.12); cursor: default; }
  #dots { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; justify-content: center; max-width: 180px; }
  .dot { height: 7px; border-radius: 4px; background: rgba(255,255,255,0.2); cursor: pointer; transition: all 0.3s ease; flex-shrink: 0; }
  .dot.active { background: var(--gold); width: 20px !important; }

  #toc-overlay {
    position: absolute; inset: 0; z-index: 30;
    background: rgba(10,9,8,0.97);
    display: none; flex-direction: column; overflow: hidden;
  }
  #toc-overlay.open { display: flex; }
  #toc-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 20px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  #toc-header h2 { font-family: 'Lora', serif; font-size: 18px; font-weight: 400; color: var(--text); }
  #toc-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 26px; line-height: 1; padding: 4px 8px; outline: none; }
  #toc-list { flex: 1; overflow-y: auto; padding: 8px 0; }
  .toc-item {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 20px; cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background 0.15s ease;
  }
  .toc-item:active { background: rgba(255,255,255,0.05); }
  .toc-item.current { background: var(--gold-dim); }
  .toc-num { font-family: 'Nunito', sans-serif; font-size: 11px; color: var(--muted); letter-spacing: 0.08em; min-width: 30px; }
  .toc-label { font-family: 'Lora', serif; font-size: 15px; color: var(--text); }
  .toc-item.current .toc-label { color: var(--gold); }
</style>
</head>
<body>
<div id="app">

  <div id="topbar">
    <span id="page-label">Cover</span>
    <div id="controls">
      <button class="btn" id="btn-toc" onclick="toggleTOC()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        <span>Pages</span>
      </button>
      <button class="btn" id="btn-sound" onclick="toggleSound()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
        <span>Sound</span>
      </button>
      <button class="btn" id="btn-auto" onclick="toggleAutoplay()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" id="auto-icon"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        <span>Auto</span>
      </button>
    </div>
  </div>

  <div id="img-area">
    <!-- tap zones -->
    <div id="tap-left"  onclick="handleTapLeft()"></div>
    <div id="tap-right" onclick="handleTapRight()"></div>
  </div>

  <div id="hint">← Left quarter goes back &nbsp;·&nbsp; Right goes forward &nbsp;·&nbsp; Pinch to zoom</div>
  <div id="soundbars">
    <div class="bar" style="height:8px;animation-delay:0s"></div>
    <div class="bar" style="height:14px;animation-delay:0.08s"></div>
    <div class="bar" style="height:20px;animation-delay:0.16s"></div>
    <div class="bar" style="height:14px;animation-delay:0.24s"></div>
    <div class="bar" style="height:8px;animation-delay:0.32s"></div>
  </div>
  <div id="toast"></div>

  <div id="bottombar">
    <button class="nav-btn" id="btn-prev" onclick="goPrev()">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div id="dots"></div>
    <button class="nav-btn" id="btn-next" onclick="goNext()">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>

  <div id="toc-overlay">
    <div id="toc-header">
      <h2>Pages</h2>
      <button id="toc-close" onclick="toggleTOC()">✕</button>
    </div>
    <div id="toc-list"></div>
  </div>

</div>
<script>
// ══════════════════════════════════════════════
// PAGE DATA
// Replace svg(...) with "images/cover.jpg" etc
// and add audio: "audio/cover.mp3" when ready
// ══════════════════════════════════════════════
function svg(bg1, bg2, emoji, title, sub) {
  return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(
    `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560">
      <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="${bg1}"/>
        <stop offset="100%" stop-color="${bg2}"/>
      </linearGradient></defs>
      <rect width="800" height="560" fill="url(#g)"/>
      <text x="400" y="195" text-anchor="middle" font-size="88" font-family="serif">${emoji}</text>
      <text x="400" y="288" text-anchor="middle" font-size="34" font-weight="bold" fill="white" font-family="Georgia,serif">${title}</text>
      <text x="400" y="338" text-anchor="middle" font-size="19" fill="rgba(255,255,255,0.78)" font-family="Georgia,serif">${sub}</text>
    </svg>`
  );
}

const PAGES = [
  { image: svg('#3a6d96','#1e3d5c','🐴','Why is the Sky Blue?','by Sally Grindley'),  audio: null, label: 'Cover' },
  { image: svg('#5a8f52','#2d5228','🐇','Page 1','Rabbit came bounding across the field.'), audio: null, label: 'Page 1' },
  { image: svg('#b8955a','#7a5c28','☁️','Page 2','"Why is the sky blue?" he asked.'), audio: null, label: 'Page 2' },
  { image: svg('#6b5fa0','#3a306e','🌿','Page 3','Donkey chewed slowly on a piece of grass.'), audio: null, label: 'Page 3' },
  { image: svg('#9e5050','#6e2020','📖','Page 4','"I will teach you," said Donkey.'), audio: null, label: 'Page 4' },
  { image: svg('#4a9090','#1e5858','🌳','Page 5','"But you must sit still and listen."'), audio: null, label: 'Page 5' },
  { image: svg('#a08840','#6a5810','🐇','Page 6','Rabbit tried very hard to sit still.'), audio: null, label: 'Page 6' },
  { image: svg('#3a6e3a','#1a3e1a','🍃','Page 7','But it was very difficult indeed.'), audio: null, label: 'Page 7' },
  { image: svg('#3a5a90','#1a2e60','☀️','Page 8','Donkey told Rabbit about the sun.'), audio: null, label: 'Page 8' },
  { image: svg('#906030','#5a3000','🌅','Page 9','And about the light in the sky.'), audio: null, label: 'Page 9' },
  { image: svg('#604090','#300060','✨','Page 10','Rabbit listened with wide eyes.'), audio: null, label: 'Page 10' },
  { image: svg('#2e7a58','#0e4a30','🌙','Page 11','"Can I come back tomorrow?" asked Rabbit.'), audio: null, label: 'Page 11' },
  { image: svg('#7a4838','#4a1808','💙','Page 12','"I missed why the sky is blue," said Rabbit.'), audio: null, label: 'Page 12' },
  { image: svg('#3a6890','#1a3860','🤔','Page 13','"I really want to know why."'), audio: null, label: 'Page 13' },
  { image: svg('#6a7a38','#3a4a08','🐴','Page 14','"I can only teach you if you sit still."'), audio: null, label: 'Page 14' },
  { image: svg('#904858','#601828','🐇','Page 15','"I will sit still," said Rabbit.'), audio: null, label: 'Page 15' },
  { image: svg('#2a8878','#0a4840','🌿','Page 16','"I will sit still and I will listen."'), audio: null, label: 'Page 16' },
  { image: svg('#807050','#503e18','📚','Page 17','"Tomorrow I will teach you what I know."'), audio: null, label: 'Page 17' },
  { image: svg('#404880','#101848','🎉','Page 18','Rabbit leapt in the air in excitement.'), audio: null, label: 'Page 18' },
  { image: svg('#684878','#381848','🌈','Page 19','And ran and rolled and bounced...'), audio: null, label: 'Page 19' },
  { image: svg('#2a6040','#0a3018','🍵','Page 20','All the way home to tea.'), audio: null, label: 'Page 20' },
  { image: svg('#3a6d96','#1e3d5c','⭐','The End','Why is the Sky Blue?'), audio: null, label: 'The End' },
];

// ── State ──
let current = 0, autoplay = false, soundOn = false, transitioning = false, autoTimer = null;
let scale = 1, offX = 0, offY = 0;
let lastDist = null, lastMX = 0, lastMY = 0;
let dragging = false, dragSX = 0, dragSY = 0, dragOX = 0, dragOY = 0;
let lastTap = 0, tapTimer = null;
let audioEl = null;

// ── Init ──
function init() {
  buildDots();
  buildTOC();
  renderPage(0);
  setupTouch();
  setTimeout(() => { document.getElementById('hint').style.display = 'none'; }, 5000);
}

// ── Render ──
function renderPage(idx) {
  const p = PAGES[idx];
  const area = document.getElementById('img-area');
  // Remove old img if present
  const old = area.querySelector('img');
  if (old) old.remove();
  const img = document.createElement('img');
  img.src = p.image;
  img.alt = p.label;
  img.draggable = false;
  // Insert behind tap zones
  area.insertBefore(img, area.firstChild);
  document.getElementById('page-label').textContent = p.label;
  document.getElementById('btn-prev').disabled = idx === 0;
  document.getElementById('btn-next').disabled = idx === PAGES.length - 1;
  updateDots();
  updateTOC();
}

// ── Navigation ──
function goTo(idx) {
  if (idx < 0 || idx >= PAGES.length || transitioning) return;
  clearAutoTimer(); stopAudio();
  transitioning = true;
  const img = document.getElementById('img-area').querySelector('img');
  if (img) img.classList.add('fade');
  setTimeout(() => {
    current = idx;
    renderPage(idx);
    resetZoom();
    transitioning = false;
    if (autoplay) scheduleAutoAdvance();
    if (soundOn && PAGES[idx].audio) playAudio(PAGES[idx].audio);
  }, 220);
}

function goNext() { if (current < PAGES.length - 1) goTo(current + 1); else if (autoplay) setAutoplay(false); }
function goPrev() { if (current > 0) goTo(current - 1); }

// ── Tap zones ──
function handleTapLeft() {
  if (scale > 1.05) return; // zoomed — no nav
  goPrev();
}

function handleTapRight() {
  if (scale > 1.05) return; // zoomed — no nav
  // detect double-tap for zoom reset
  const now = Date.now();
  if (now - lastTap < 300) {
    clearTimeout(tapTimer); tapTimer = null; lastTap = 0;
    resetZoom(); return;
  }
  lastTap = now;
  tapTimer = setTimeout(() => { tapTimer = null; goNext(); }, 300);
}

// ── Autoplay ──
function scheduleAutoAdvance() {
  clearAutoTimer();
  if (PAGES[current].audio) return; // audio onended handles advance
  autoTimer = setTimeout(() => { if (autoplay) goNext(); }, 3000);
}

function clearAutoTimer() {
  if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; }
}

function setAutoplay(val) {
  autoplay = val;
  document.getElementById('btn-auto').classList.toggle('active', autoplay);
  const icon = document.getElementById('auto-icon');
  if (autoplay) {
    icon.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
    scheduleAutoAdvance();
  } else {
    icon.innerHTML = '<polygon points="5 3 19 12 5 21 5 3"/>';
    clearAutoTimer();
  }
}
function toggleAutoplay() { setAutoplay(!autoplay); }

// ── Audio ──
function playAudio(src) {
  stopAudio();
  audioEl = new Audio(src);
  audioEl.onplay = () => document.getElementById('soundbars').classList.add('visible');
  audioEl.onended = () => {
    document.getElementById('soundbars').classList.remove('visible');
    if (autoplay) goNext();
  };
  audioEl.onerror = () => {
    document.getElementById('soundbars').classList.remove('visible');
    showToast('⚠️ Audio needs a web server to play (works on GitHub Pages)');
    if (autoplay) scheduleAutoAdvance();
  };
  audioEl.play().catch(() => {
    showToast('⚠️ Audio needs a web server to play (works on GitHub Pages)');
  });
}

function stopAudio() {
  if (audioEl) { audioEl.pause(); audioEl = null; }
  document.getElementById('soundbars').classList.remove('visible');
}

function toggleSound() {
  soundOn = !soundOn;
  document.getElementById('btn-sound').classList.toggle('active', soundOn);
  if (soundOn && PAGES[current].audio) playAudio(PAGES[current].audio);
  else stopAudio();
}

// ── Toast ──
let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 4000);
}

// ── Dots ──
function buildDots() {
  const c = document.getElementById('dots');
  c.innerHTML = '';
  PAGES.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i===0?' active':'');
    d.style.width = i===0?'20px':'7px';
    d.onclick = (e) => { e.stopPropagation(); closeTOC(); goTo(i); };
    c.appendChild(d);
  });
}
function updateDots() {
  document.querySelectorAll('.dot').forEach((d,i) => {
    d.classList.toggle('active', i===current);
    d.style.width = i===current?'20px':'7px';
  });
}

// ── TOC ──
function buildTOC() {
  const list = document.getElementById('toc-list');
  list.innerHTML = '';
  PAGES.forEach((p,i) => {
    const item = document.createElement('div');
    item.className = 'toc-item' + (i===0?' current':'');
    item.id = 'toc-item-' + i;
    item.innerHTML = `<span class="toc-num">${String(i).padStart(2,'0')}</span><span class="toc-label">${p.label}</span>`;
    item.onclick = () => { closeTOC(); goTo(i); };
    list.appendChild(item);
  });
}
function updateTOC() {
  document.querySelectorAll('.toc-item').forEach((el,i) => el.classList.toggle('current', i===current));
}
function toggleTOC() { document.getElementById('toc-overlay').classList.toggle('open'); }
function closeTOC()  { document.getElementById('toc-overlay').classList.remove('open'); }

// ── Pinch zoom ──
function getImg() { return document.getElementById('img-area').querySelector('img'); }
function resetZoom() { scale=1; offX=0; offY=0; applyTransform(); }
function applyTransform() {
  const el = getImg();
  if (el) el.style.transform = `scale(${scale}) translate(${offX/scale}px,${offY/scale}px)`;
}

function setupTouch() {
  const area = document.getElementById('img-area');
  area.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) {
      const t0=e.touches[0], t1=e.touches[1];
      lastDist = Math.hypot(t0.clientX-t1.clientX, t0.clientY-t1.clientY);
      lastMX=(t0.clientX+t1.clientX)/2; lastMY=(t0.clientY+t1.clientY)/2;
    } else if (e.touches.length === 1 && scale > 1) {
      dragging=true; dragSX=e.touches[0].clientX; dragSY=e.touches[0].clientY;
      dragOX=offX; dragOY=offY;
    }
  }, {passive:true});

  area.addEventListener('touchmove', (e) => {
    if (e.touches.length === 2 && lastDist) {
      e.preventDefault();
      const t0=e.touches[0], t1=e.touches[1];
      const d=Math.hypot(t0.clientX-t1.clientX, t0.clientY-t1.clientY);
      const mx=(t0.clientX+t1.clientX)/2, my=(t0.clientY+t1.clientY)/2;
      scale=Math.min(4, Math.max(1, scale*(d/lastDist)));
      offX+=mx-lastMX; offY+=my-lastMY;
      lastDist=d; lastMX=mx; lastMY=my;
      applyTransform();
    } else if (e.touches.length === 1 && dragging) {
      e.preventDefault();
      offX=dragOX+(e.touches[0].clientX-dragSX);
      offY=dragOY+(e.touches[0].clientY-dragSY);
      applyTransform();
    }
  }, {passive:false});

  area.addEventListener('touchend', () => {
    lastDist=null; dragging=false;
    if (scale < 1.05) resetZoom();
  });
}

init();
</script>
</body>
</html>
