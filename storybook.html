<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Storybook</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden}
  body{background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
       user-select:none;-webkit-user-select:none;touch-action:none}

  /* ---------- top control bar ---------- */
  #bar{
    position:fixed;top:0;left:0;right:0;z-index:20;
    display:flex;align-items:center;gap:6px;
    padding:calc(env(safe-area-inset-top) + 8px) 10px 8px;
    background:linear-gradient(rgba(0,0,0,.75),transparent);
  }
  #bar .title{
    flex:1;font-size:.85rem;font-weight:600;color:rgba(255,255,255,.85);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 4px;
  }
  .btn{
    min-width:40px;height:40px;padding:0 10px;border:none;border-radius:20px;
    background:rgba(255,255,255,.15);color:#fff;font-size:1.05rem;line-height:40px;
    text-align:center;cursor:pointer;backdrop-filter:blur(6px);
  }
  .btn.on{background:rgba(90,170,255,.55)}
  .btn:focus-visible{outline:2px solid #ffd58a}
  a.btn{display:inline-block;text-decoration:none}

  /* ---------- page area ---------- */
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
  #zoomWrap{will-change:transform;transform-origin:0 0}
  #pageImg{max-width:100vw;max-height:100vh;display:block;pointer-events:none}
  /* placeholder for missing page images */
  #pagePh{
    display:none;width:82vw;max-width:420px;aspect-ratio:3/4;border-radius:10px;
    align-items:center;justify-content:center;text-align:center;padding:20px;
    font-size:1.05rem;font-weight:600;color:#223;line-height:1.4;
  }

  /* ---------- bottom: dots + hint ---------- */
  #bottom{
    position:fixed;left:0;right:0;bottom:0;z-index:20;text-align:center;
    padding:10px 12px calc(env(safe-area-inset-bottom) + 12px);
    background:linear-gradient(transparent,rgba(0,0,0,.7));
    pointer-events:none;
  }
  #dots{display:flex;justify-content:center;flex-wrap:wrap;gap:5px;pointer-events:auto}
  #dots i{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.3);cursor:pointer}
  #dots i.cur{background:#ffd58a;transform:scale(1.35)}
  #hint{font-size:.7rem;color:rgba(255,255,255,.45);margin-top:8px}

  /* ---------- arrow buttons (larger screens / accessibility) ---------- */
  .arrow{
    position:fixed;top:50%;transform:translateY(-50%);z-index:15;
    width:44px;height:64px;border:none;border-radius:10px;
    background:rgba(255,255,255,.10);color:rgba(255,255,255,.7);font-size:1.5rem;cursor:pointer;
  }
  #prevBtn{left:6px} #nextBtn{right:6px}

  /* ---------- table of contents overlay ---------- */
  #toc{
    position:fixed;inset:0;z-index:30;display:none;flex-direction:column;
    background:rgba(10,12,28,.96);padding:calc(env(safe-area-inset-top) + 14px) 14px 14px;
  }
  #toc.open{display:flex}
  #toc header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  #toc h2{font-size:1.05rem}
  #tocGrid{
    flex:1;overflow-y:auto;display:grid;gap:10px;
    grid-template-columns:repeat(auto-fill,minmax(88px,1fr));
    padding-bottom:20px;touch-action:pan-y;
  }
  .tocItem{border:none;background:none;color:#fff;cursor:pointer;text-align:center;padding:0}
  .tocItem .thumb{
    aspect-ratio:3/4;border-radius:6px;overflow:hidden;background:#26304f;
    display:flex;align-items:center;justify-content:center;font-size:.8rem;color:rgba(255,255,255,.6);
    border:2px solid transparent;
  }
  .tocItem.cur .thumb{border-color:#ffd58a}
  .tocItem img{width:100%;height:100%;object-fit:cover;display:block}
  .tocItem span{display:block;font-size:.68rem;margin-top:4px;color:rgba(255,255,255,.7)}

  /* ---------- error screen ---------- */
  #err{
    position:fixed;inset:0;z-index:40;display:none;flex-direction:column;gap:14px;
    align-items:center;justify-content:center;text-align:center;padding:30px;background:#131a3d;
  }
  #err a{color:#ffd58a}
</style>
</head>
<body>

<div id="stage">
  <div id="zoomWrap">
    <img id="pageImg" alt="">
    <div id="pagePh"></div>
  </div>
</div>

<div id="bar">
  <a class="btn" id="homeBtn" href="index.html" aria-label="Back to library">⌂</a>
  <div class="title" id="bookTitle"></div>
  <button class="btn" id="langBtn" aria-label="Switch narration language">🇮🇪</button>
  <button class="btn" id="soundBtn" aria-label="Play narration">🔊</button>
  <button class="btn" id="autoBtn" aria-label="Auto-play">▶</button>
  <button class="btn" id="tocBtn" aria-label="Show all pages">▦</button>
</div>

<button class="arrow" id="prevBtn" aria-label="Previous page">‹</button>
<button class="arrow" id="nextBtn" aria-label="Next page">›</button>

<div id="bottom">
  <div id="dots"></div>
  <div id="hint">Tap left quarter to go back · right to go forward · pinch to zoom · double-tap to reset</div>
</div>

<div id="toc">
  <header>
    <h2>Pages</h2>
    <button class="btn" id="tocClose" aria-label="Close">✕</button>
  </header>
  <div id="tocGrid"></div>
</div>

<div id="err">
  <div style="font-size:2rem">📚</div>
  <div id="errMsg">Book not found.</div>
  <a href="index.html">Back to the library</a>
</div>

<script src="books.js"></script>
<script>
(function(){
  "use strict";

  /* ================= book setup ================= */
  const params = new URLSearchParams(location.search);
  const slug = params.get("book");
  const book = (window.BOOKS || []).find(b => b.slug === slug);

  if (!book) {
    document.getElementById("err").style.display = "flex";
    document.getElementById("errMsg").textContent =
      slug ? 'No book called "' + slug + '" in books.js.' : "No book selected.";
    return;
  }

  document.title = book.title;
  document.getElementById("bookTitle").textContent = book.title;

  const base = "books/" + book.slug;
  // page names: cover, page1, page2, ... page(pageCount-1)
  const PAGES = ["cover"];
  for (let i = 1; i < book.pageCount; i++) PAGES.push("page" + i);

  const PASTELS = ["#ffd6e0","#cdeffd","#fff3c4","#d8f5d0","#e7dcff","#ffe3c9"];

  /* ================= state ================= */
  let cur = 0;                 // current page index
  let lang = localStorage.getItem("storybook-lang") || "en";
  if (!book.langs.includes(lang)) lang = book.langs[0];
  let autoPlay = false;
  let autoTimer = null;        // 3-second fallback timer
  let audio = null;            // current Audio object
  const AUTO_FALLBACK_MS = 3000;

  /* ================= elements ================= */
  const img      = document.getElementById("pageImg");
  const ph       = document.getElementById("pagePh");
  const zoomWrap = document.getElementById("zoomWrap");
  const stage    = document.getElementById("stage");
  const dotsBox  = document.getElementById("dots");
  const langBtn  = document.getElementById("langBtn");
  const soundBtn = document.getElementById("soundBtn");
  const autoBtn  = document.getElementById("autoBtn");
  const toc      = document.getElementById("toc");
  const tocGrid  = document.getElementById("tocGrid");

  /* ================= page rendering ================= */
  function imgSrc(name){ return base + "/images/" + name + ".jpg"; }

  function showPage(n){
    cur = Math.max(0, Math.min(PAGES.length - 1, n));
    resetZoom();
    stopAudio();

    const name = PAGES[cur];
    ph.style.display = "none";
    img.style.display = "block";
    img.src = imgSrc(name);
    img.onerror = () => {
      // no image yet — friendly placeholder
      img.style.display = "none";
      ph.style.display = "flex";
      ph.style.background = PASTELS[cur % PASTELS.length];
      ph.textContent = book.title + "\n" + (cur === 0 ? "Cover" : "Page " + cur) +
                       " — image not added yet";
    };

    updateDots();
    if (autoPlay) startAutoForPage();
  }

  /* ================= dots ================= */
  PAGES.forEach((_, i) => {
    const d = document.createElement("i");
    d.addEventListener("click", e => { e.stopPropagation(); showPage(i); });
    dotsBox.appendChild(d);
  });
  function updateDots(){
    [...dotsBox.children].forEach((d, i) => d.classList.toggle("cur", i === cur));
  }

  /* ================= audio ================= */
  function audioSrc(name){ return base + "/audio/" + lang + "/" + name + ".mp3"; }

  function stopAudio(){
    if (audio) { audio.onended = audio.onerror = null; audio.pause(); audio = null; }
    if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; }
  }

  // Play this page's narration. onDone (optional) runs when it finishes
  // or immediately-ish if the file doesn't exist.
  function playCurrent(onDone){
    stopAudio();
    audio = new Audio(audioSrc(PAGES[cur]));
    audio.onended = () => { audio = null; if (onDone) onDone(); };
    audio.onerror = () => { audio = null; if (onDone) onDone(false); };
    audio.play().catch(() => { audio = null; if (onDone) onDone(false); });
  }

  soundBtn.addEventListener("click", e => { e.stopPropagation(); playCurrent(); });

  /* ================= language toggle ================= */
  function renderLang(){ langBtn.textContent = lang === "en" ? "🇮🇪" : "🇪🇸"; }
  langBtn.addEventListener("click", e => {
    e.stopPropagation();
    const i = book.langs.indexOf(lang);
    lang = book.langs[(i + 1) % book.langs.length];
    localStorage.setItem("storybook-lang", lang);
    renderLang();
    stopAudio();
    if (autoPlay) startAutoForPage();   // restart narration in new language
  });
  renderLang();

  /* ================= auto-play ================= */
  function startAutoForPage(){
    playCurrent(played => {
      if (!autoPlay) return;
      if (played === false) {
        // no audio file — wait 3 seconds, then turn the page
        autoTimer = setTimeout(advanceAuto, AUTO_FALLBACK_MS);
      } else {
        advanceAuto();
      }
    });
  }
  function advanceAuto(){
    if (!autoPlay) return;
    if (cur < PAGES.length - 1) showPage(cur + 1);
    else setAuto(false);                 // reached the end
  }
  function setAuto(on){
    autoPlay = on;
    autoBtn.classList.toggle("on", on);
    autoBtn.textContent = on ? "⏸" : "▶";
    if (on) startAutoForPage(); else stopAudio();
  }
  autoBtn.addEventListener("click", e => { e.stopPropagation(); setAuto(!autoPlay); });

  /* ================= table of contents ================= */
  PAGES.forEach((name, i) => {
    const b = document.createElement("button");
    b.className = "tocItem";
    const th = document.createElement("div");
    th.className = "thumb";
    const ti = document.createElement("img");
    ti.loading = "lazy";
    ti.src = imgSrc(name);
    ti.alt = "";
    ti.onerror = () => { ti.remove(); th.textContent = i === 0 ? "Cover" : i; };
    th.appendChild(ti);
    const lbl = document.createElement("span");
    lbl.textContent = i === 0 ? "Cover" : "Page " + i;
    b.appendChild(th); b.appendChild(lbl);
    b.addEventListener("click", () => { toc.classList.remove("open"); showPage(i); });
    tocGrid.appendChild(b);
  });
  function refreshTocHighlight(){
    [...tocGrid.children].forEach((b, i) => b.classList.toggle("cur", i === cur));
  }
  document.getElementById("tocBtn").addEventListener("click", e => {
    e.stopPropagation(); refreshTocHighlight(); toc.classList.add("open");
  });
  document.getElementById("tocClose").addEventListener("click", () => toc.classList.remove("open"));

  /* ================= navigation ================= */
  document.getElementById("prevBtn").addEventListener("click", e => { e.stopPropagation(); showPage(cur - 1); });
  document.getElementById("nextBtn").addEventListener("click", e => { e.stopPropagation(); showPage(cur + 1); });

  /* ================= zoom & tap handling =================
     - pinch to zoom (1x–4x), one-finger pan while zoomed
     - double-tap resets zoom
     - taps only turn pages when NOT zoomed and NOT right after a pinch
  */
  let scale = 1, tx = 0, ty = 0;
  let pinching = false, pinchStartDist = 0, pinchStartScale = 1;
  let panStart = null, lastTapTime = 0, suppressTapUntil = 0;

  function applyTransform(){
    zoomWrap.style.transform = "translate(" + tx + "px," + ty + "px) scale(" + scale + ")";
  }
  function resetZoom(){ scale = 1; tx = 0; ty = 0; applyTransform(); }

  function clampPan(){
    // keep the image loosely on screen while panning
    const limX = (scale - 1) * window.innerWidth;
    const limY = (scale - 1) * window.innerHeight;
    tx = Math.max(-limX, Math.min(limX * 0.2 + 40, tx));
    ty = Math.max(-limY, Math.min(limY * 0.2 + 40, ty));
  }

  function dist(t){ return Math.hypot(t[0].clientX - t[1].clientX, t[0].clientY - t[1].clientY); }

  stage.addEventListener("touchstart", e => {
    if (e.touches.length === 2) {
      pinching = true;
      pinchStartDist = dist(e.touches);
      pinchStartScale = scale;
    } else if (e.touches.length === 1 && scale > 1) {
      panStart = { x: e.touches[0].clientX - tx, y: e.touches[0].clientY - ty };
    }
  }, { passive: true });

  stage.addEventListener("touchmove", e => {
    if (pinching && e.touches.length === 2) {
      scale = Math.max(1, Math.min(4, pinchStartScale * dist(e.touches) / pinchStartDist));
      clampPan(); applyTransform();
    } else if (panStart && e.touches.length === 1 && scale > 1) {
      tx = e.touches[0].clientX - panStart.x;
      ty = e.touches[0].clientY - panStart.y;
      clampPan(); applyTransform();
    }
    e.preventDefault();
  }, { passive: false });

  stage.addEventListener("touchend", e => {
    if (pinching && e.touches.length < 2) {
      pinching = false;
      suppressTapUntil = Date.now() + 400;   // ignore the tap that ends a pinch
      if (scale <= 1.05) resetZoom();
    }
    if (e.touches.length === 0) panStart = null;
  });

  // tap = double-tap reset / page turn (only when not zoomed)
  stage.addEventListener("click", e => {
    const now = Date.now();
    if (now < suppressTapUntil) return;

    if (now - lastTapTime < 300) {          // double tap → reset zoom
      lastTapTime = 0;
      resetZoom();
      return;
    }
    lastTapTime = now;
    const myTap = now;

    if (scale > 1) return;                  // zoomed in → taps never turn pages

    // single tap: left 25% back, right 75% forward
    // (short delay so a double-tap can cancel it)
    const x = e.clientX;
    setTimeout(() => {
      if (lastTapTime === myTap) {          // no second tap arrived → it was a single tap
        if (x < window.innerWidth * 0.25) showPage(cur - 1);
        else showPage(cur + 1);
      }
    }, 300);
  });

  // keyboard support for desktop testing
  document.addEventListener("keydown", e => {
    if (e.key === "ArrowLeft") showPage(cur - 1);
    if (e.key === "ArrowRight") showPage(cur + 1);
  });

  /* ================= go ================= */
  showPage(0);
})();
</script>
</body>
</html>
